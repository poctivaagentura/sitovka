[build]
  command = "npm run build"
  publish = "dist"

# Redirect netlify.app subdomain to custom domain
[[redirects]]
  from = "https://sitovka.netlify.app/*"
  to = "https://sitovka.net/:splat"
  status = 301
  force = true

# Redirect www to apex domain (canonical URL)
[[redirects]]
  from = "https://www.sitovka.net/*"
  to = "https://sitovka.net/:splat"
  status = 301
  force = true

# Redirect HTTP to HTTPS for apex domain
[[redirects]]
  from = "http://sitovka.net/*"
  to = "https://sitovka.net/:splat"
  status = 301
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
